<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FrostDates Widget Demo</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      max-width: 800px;
      margin: 40px auto;
      padding: 0 20px;
      background: #f5f5f5;
    }
    h1 { margin-bottom: 8px; }
    p.subtitle { color: #666; margin-bottom: 30px; }
    h2 { margin-top: 40px; margin-bottom: 16px; }
    .demo-dark { background: #1a1a2e; padding: 20px; border-radius: 8px; margin-top: 20px; }
  </style>
</head>
<body>
  <h1>FrostDates Widget Demo</h1>
  <p class="subtitle">Embeddable frost date lookup for any website.</p>

  <h2>Light Theme</h2>
  <frostdates-widget site-id="demo-site-123"></frostdates-widget>

  <h2>Dark Theme</h2>
  <div class="demo-dark">
    <frostdates-widget site-id="demo-site-123" theme="dark"></frostdates-widget>
  </div>

  <h2>Programmatic Init</h2>
  <div id="widget-container"></div>

  <script type="module" src="/src/index.ts"></script>
  <script type="module">
    // Wait for custom element to be defined
    customElements.whenDefined('frostdates-widget').then(() => {
      window.FrostDatesWidget.init({
        siteId: 'demo-site-123',
        container: '#widget-container',
      });
    });
  </script>
</body>
</html>
